name: Build and Push Theia Cloud Images

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  release:
    types:
      - published
      - prereleased

  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Build backend to use"
        required: false
        default: self-hosted-buildkit
        type: choice
        options:
          - self-hosted-buildkit
          - github-runners
      image_tag:
        description: "Optional image tag override (e.g. my-test-tag)"
        required: false
        default: ""
        type: string
      arc_registry_cache:
        description: "Enable ARC registry cache import/export (slower on stateful BuildKit; default off)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
  cancel-in-progress: false

jobs:
  build-and-push-landing-page:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/split-build-workflow-modes
    with:
      docker-file: dockerfiles/landing-page/Dockerfile
      image-name: ${{ github.repository_owner }}/${{ github.event.repository.name }}/landing-page
      docker-context: .
      image-tag: ${{ inputs.image_tag || '' }}
      execution-mode: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
      arc-registry-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.arc_registry_cache || false }}
      cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-cache
      cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-cache,mode=max,image-manifest=true,oci-mediatypes=true
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      network: host
    secrets: inherit

  build-and-push-operator:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/split-build-workflow-modes
    with:
      docker-file: dockerfiles/operator/Dockerfile
      image-name: ${{ github.repository_owner }}/${{ github.event.repository.name }}/operator
      docker-context: .
      image-tag: ${{ inputs.image_tag || '' }}
      execution-mode: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
      arc-registry-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.arc_registry_cache || false }}
      cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-cache
      cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-cache,mode=max,image-manifest=true,oci-mediatypes=true
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      network: host
    secrets:
      docker-secrets: ${{ secrets.SENTRY_AUTH_TOKEN != '' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}

  build-and-push-service:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/split-build-workflow-modes
    with:
      docker-file: dockerfiles/service/Dockerfile
      image-name: ${{ github.repository_owner }}/${{ github.event.repository.name }}/service
      docker-context: .
      image-tag: ${{ inputs.image_tag || '' }}
      execution-mode: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
      arc-registry-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.arc_registry_cache || false }}
      cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-cache
      cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-cache,mode=max,image-manifest=true,oci-mediatypes=true
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      network: host
    secrets:
      docker-secrets: ${{ secrets.SENTRY_AUTH_TOKEN != '' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}
