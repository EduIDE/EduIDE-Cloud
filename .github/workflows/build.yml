name: Build and Push Theia Cloud Images

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  schedule:
    - cron: '0 2 * * *'

  release:
    types:
      - published
      - prereleased

  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Build backend to use"
        required: false
        default: self-hosted-buildkit
        type: choice
        options:
          - self-hosted-buildkit
          - github-runners
      image_tag:
        description: "Optional image tag override (e.g. my-test-tag)"
        required: false
        default: ""
        type: string
      arc_registry_cache:
        description: "Enable ARC registry cache import/export (slower on stateful BuildKit; default off)"
        required: false
        default: false
        type: boolean
      disable_layer_cache:
        description: "Disable Docker layer cache (--no-cache) for stress testing while keeping BuildKit mount caches"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
  cancel-in-progress: false

jobs:

  build-and-push-operator:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/split-build-workflow-modes
    with:
      docker-file: dockerfiles/operator/Dockerfile
      image-name: eduide/eduide-cloud/operator
      docker-context: .
      image-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
      execution-mode: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
      arc-registry-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.arc_registry_cache || false }}
      no-cache: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.disable_layer_cache) || false }}
      cache-from: ${{ (github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit') == 'github-runners' && 'type=registry,ref=ghcr.io/eduide/eduide-cloud/operator:build-cache' || '' }}
      cache-to: ${{ (github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit') == 'github-runners' && 'type=registry,ref=ghcr.io/eduide/eduide-cloud/operator:build-cache,mode=max,image-manifest=true,oci-mediatypes=true' || '' }}
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      network: host
    secrets:
      docker-secrets: ${{ secrets.SENTRY_AUTH_TOKEN != '' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}

  build-and-push-conversion-webhook:
    needs: determine-tag
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/arc-runner-support
    with:
      docker-file: dockerfiles/conversion-webhook/Dockerfile
      image-name: ${{ needs.determine-tag.outputs.image_repo }}/conversion-webhook
      docker-context: .
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      runner-amd64: "ubuntu-latest"
      runner-arm64: "ubuntu-24.04-arm"
      network: host
      docker-hub-mirror: "http://registry-mirror.registry-mirror.svc.cluster.local:5000"
      ghcr-mirror: "http://registry-mirror-ghcr.registry-mirror.svc.cluster.local:5000"
      npm-registry: "http://verdaccio.verdaccio.svc.cluster.local:4873"
      apt-proxy: "http://apt-cacher-ng.apt-cacher-ng.svc.cluster.local:3142"
      cache-from: |
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/conversion-webhook:${{ needs.determine-tag.outputs.cache_tag }}
        type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/conversion-webhook:build-cache
      cache-to: "type=registry,ref=ghcr.io/${{ needs.determine-tag.outputs.image_repo }}/conversion-webhook:${{ needs.determine-tag.outputs.cache_tag }},mode=max"
    secrets: inherit

  build-and-push-service:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/split-build-workflow-modes
    with:
      docker-file: dockerfiles/service/Dockerfile
      image-name: eduide/eduide-cloud/service
      docker-context: .
      image-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
      execution-mode: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
      arc-registry-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.arc_registry_cache || false }}
      no-cache: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.disable_layer_cache) || false }}
      cache-from: ${{ (github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit') == 'github-runners' && 'type=registry,ref=ghcr.io/eduide/eduide-cloud/service:build-cache' || '' }}
      cache-to: ${{ (github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit') == 'github-runners' && 'type=registry,ref=ghcr.io/eduide/eduide-cloud/service:build-cache,mode=max,image-manifest=true,oci-mediatypes=true' || '' }}
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      network: host
    secrets:
      docker-secrets: ${{ secrets.SENTRY_AUTH_TOKEN != '' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}

  build-and-push-conversion-webhook:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/split-build-workflow-modes
    with:
      docker-file: dockerfiles/conversion-webhook/Dockerfile
      image-name: eduide/eduide-cloud/conversion-webhook
      docker-context: .
      image-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
      execution-mode: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit' }}
      arc-registry-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.arc_registry_cache || false }}
      no-cache: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.disable_layer_cache) || false }}
      cache-from: ${{ (github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit') == 'github-runners' && 'type=registry,ref=ghcr.io/eduide/eduide-cloud/conversion-webhook:build-cache' || '' }}
      cache-to: ${{ (github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'self-hosted-buildkit') == 'github-runners' && 'type=registry,ref=ghcr.io/eduide/eduide-cloud/conversion-webhook:build-cache,mode=max,image-manifest=true,oci-mediatypes=true' || '' }}
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      network: host
    secrets: inherit
